# UltraThink — Codex CLI Configuration
# Mirrors Claude Code's .claude/settings.json for Codex runtime

model = "gpt-4.1"
approval_policy = "on-request"

# ─── MCP Servers ─────────────────────────────────────────────────────────────

[mcp_servers.vfs]
command = ["vfs", "mcp"]

[mcp_servers.code-intel]
command = ["node", "code-intel/dist/index.js"]

[mcp_servers.agora]
command = ["node", "mcp/agora/dist/index.js"]

# ─── Features ────────────────────────────────────────────────────────────────

[features]
codex_hooks = true
